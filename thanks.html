<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Received | Absolute Data</title>
  <meta name="description" content="Thank you for contacting Absolute Data." />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f15;
      --bg-soft: #0f1623;
      --text: #e6f1ff;
      --muted: #98a2b3;
      --primary: #6ee7ff;
      --secondary: #a78bfa;
    }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .gradient-text { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-primary { background: linear-gradient(135deg, rgba(110,231,255,.15), rgba(167,139,250,.15)); border: 1px solid rgba(255,255,255,.12); transition: box-shadow .3s; }
    .btn-primary:hover { box-shadow: 0 8px 40px rgba(34,211,238,.3); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp .7s ease both; }
    .fade-up-2 { animation: fadeUp .7s .15s ease both; }
    .fade-up-3 { animation: fadeUp .7s .3s ease both; }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZT7XRTVRMP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZT7XRTVRMP');
  </script>
</head>
<body class="min-h-screen flex flex-col" style="background:var(--bg)">

  <!-- Nav bar -->
  <header class="w-full px-6 py-4 flex items-center justify-between border-b border-white/5" style="background:rgba(11,15,21,0.95)">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="images/logo.png" alt="Absolute Data" class="h-7 w-7 rounded-lg" />
      <span class="font-bold text-sm tracking-tight" style="color:var(--text)">Absolute Data</span>
    </a>
    <a href="index.html" class="text-xs font-medium hover:text-white transition-colors" style="color:var(--muted)">Back to Home</a>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="max-w-xl w-full">

      <!-- Card -->
      <div class="rounded-2xl p-10 text-center ring-1 ring-white/8" style="background:var(--bg-soft)">

        <!-- Animated check -->
        <div class="fade-up flex justify-center mb-7">
          <div class="relative inline-flex h-20 w-20 items-center justify-center rounded-2xl" style="background:rgba(110,231,255,0.08);box-shadow:0 0 0 1px rgba(110,231,255,0.2),0 0 40px rgba(110,231,255,0.12)">
            <svg style="color:#6ee7ff" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
        </div>

        <h1 class="fade-up-2 text-3xl md:text-4xl font-extrabold mb-3">Thank You for <span class="gradient-text">Reaching Out</span></h1>
        <p class="fade-up-2 text-base leading-relaxed mb-2" style="color:var(--muted)">
          We have received your message and a member of our team will be in touch with you shortly.
        </p>
        <p class="fade-up-2 text-sm mb-8" style="color:rgba(152,162,179,.55)">
          Expected response time: within 1 business day.
        </p>

        <div class="fade-up-3">
          <a href="index.html" class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl text-white font-medium text-sm">
            Back to Home
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full px-6 py-5 border-t border-white/5 text-center">
    <p class="text-xs" style="color:rgba(152,162,179,.4)">&copy; 2026 Absolute Data AI Limited. All rights reserved.</p>
  </footer>

</body>
</html>
