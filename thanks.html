<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Received | Absolute Data</title>
  <meta name="description" content="Thank you for contacting Absolute Data." />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f15;
      --bg-soft: #0f1623;
      --text: #e6f1ff;
      --muted: #98a2b3;
      --primary: #6ee7ff;
      --secondary: #a78bfa;
    }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .gradient-text { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .btn-primary { background: linear-gradient(135deg, rgba(110,231,255,.15), rgba(167,139,250,.15)); border: 1px solid rgba(255,255,255,.12); transition: box-shadow .3s; }
    .btn-primary:hover { box-shadow: 0 8px 40px rgba(34,211,238,.3); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6">

  <div class="max-w-lg w-full text-center">
    <!-- Icon -->
    <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl mb-6" style="background:rgba(110,231,255,0.1);box-shadow:0 0 0 1px rgba(110,231,255,0.25)">
      <svg style="color:#6ee7ff" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>

    <h1 class="text-3xl font-extrabold mb-3">Message <span class="gradient-text">Received</span></h1>
    <p class="text-base leading-relaxed mb-8" style="color:var(--muted)">
      Thank you for reaching out. We have received your message and will be in touch shortly.
    </p>

    <a href="index.html" class="btn-primary inline-flex items-center gap-2 px-6 py-3 rounded-xl text-white font-medium text-sm">
      Back to Home
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </div>

</body>
</html>
